<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>"><title>句子互动 · 行业 AI 信息收集</title><style> :root{ --ink:#1b2230; --sub:#5b6373; --line:rgba(120,130,160,.18); --glass:rgba(255,255,255,.6); --glass-strong:rgba(255,255,255,.75); --accent:#5b6cff; --grad:linear-gradient(135deg,#6a5cff 0%,#4f8cff 60%,#45c7d6 100%); --shadow:0 12px 44px rgba(50,60,110,.12),0 2px 8px rgba(50,60,110,.06); } *{box-sizing:border-box;} body{margin:0;color:var(--ink);background:#eaeefb;overflow-x:hidden;-webkit-font-smoothing:antialiased; font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;} .bg{position:fixed;inset:0;z-index:-2;background: radial-gradient(1200px 800px at 70% -10%,#e7ecff 0%,transparent 60%), radial-gradient(1000px 700px at -10% 110%,#e4fbff 0%,transparent 55%), linear-gradient(160deg,#f3f5ff 0%,#eef0fb 50%,#f0f7fb 100%);} .blob{position:fixed;border-radius:50%;filter:blur(70px);opacity:.5;z-index:-1;mix-blend-mode:multiply;animation:drift 22s ease-in-out infinite;} .b1{width:520px;height:520px;background:#9a8cff;top:-120px;left:-80px;} .b2{width:460px;height:460px;background:#6fb6ff;top:8%;right:-120px;animation-delay:-6s;} .b3{width:420px;height:420px;background:#5ce0d2;bottom:-140px;left:18%;animation-delay:-11s;} @keyframes drift{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(40px,-30px) scale(1.08);}66%{transform:translate(-30px,25px) scale(.95);}} .nav{position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:22px clamp(20px,5vw,64px);} .brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:18px;} .brand .dot{width:30px;height:30px;border-radius:9px;background:var(--grad);box-shadow:0 6px 18px rgba(91,108,255,.45); display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;} .brand small{font-weight:400;color:var(--sub);font-size:12px;margin-left:2px;} .pill{padding:9px 16px;border-radius:999px;font-size:13px;font-weight:500;border:1px solid var(--line); background:var(--glass);backdrop-filter:blur(12px);color:var(--ink);cursor:pointer;} .pill.primary{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 8px 22px rgba(91,108,255,.35);} .hero{position:relative;z-index:5;text-align:center;padding:clamp(36px,7vh,80px) clamp(20px,5vw,40px) 8px;} .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:7px 15px;border-radius:999px; background:var(--glass);border:1px solid var(--line);backdrop-filter:blur(12px);font-size:13px;color:var(--sub); margin-bottom:24px;animation:rise .8s .05s both;} .eyebrow .live{width:7px;height:7px;border-radius:50%;background:#22c98a;box-shadow:0 0 0 4px rgba(34,201,138,.18);} h1{font-size:clamp(32px,6vw,62px);line-height:1.1;margin:0 0 20px;font-weight:800;letter-spacing:-1px;animation:rise .9s .12s both;} h1 .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;} .sub{max-width:600px;margin:0 auto;color:var(--sub);font-size:clamp(15px,1.7vw,18px);line-height:1.7;animation:rise .9s .2s both;} @keyframes rise{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:none;}} .steps{position:relative;z-index:5;max-width:760px;margin:34px auto 0;padding:0 24px;display:flex;gap:14px; justify-content:center;flex-wrap:wrap;animation:rise 1s .28s both;} .step{flex:1;min-width:150px;background:var(--glass);border:1px solid var(--line);border-radius:16px; backdrop-filter:blur(14px);padding:16px 18px;text-align:left;} .step .n{width:26px;height:26px;border-radius:8px;background:var(--grad);color:#fff;font-weight:700;font-size:13px; display:flex;align-items:center;justify-content:center;margin-bottom:9px;} .step .st{font-weight:700;font-size:15px;} .step .sd{font-size:12.5px;color:var(--sub);margin-top:2px;} .axis-wrap{position:relative;z-index:5;max-width:820px;margin:48px auto 0;padding:0 24px;animation:rise 1s .36s both;} .axis{position:relative;display:flex;justify-content:space-between;align-items:flex-start;} .axis::before{content:"";position:absolute;top:11px;left:6%;right:6%;height:2px; background:linear-gradient(90deg,transparent,var(--line) 12%,var(--line) 88%,transparent);} .node{position:relative;display:flex;flex-direction:column;align-items:center;gap:11px;cursor:pointer;flex:1;background:none;border:none;font-family:inherit;} .node .ring{width:24px;height:24px;border-radius:50%;background:#fff;border:2px solid #c4cbe4;transition:.25s;position:relative;z-index:1;} .node .lbl{font-size:15px;font-weight:600;color:var(--sub);transition:.2s;} .node .st{font-size:11px;color:#9aa1b5;} .node:hover .ring{border-color:var(--accent);transform:scale(1.1);} .node.active .ring{background:var(--grad);border-color:transparent;box-shadow:0 0 0 6px rgba(91,108,255,.16),0 6px 16px rgba(91,108,255,.4);} .node.active .lbl{color:var(--ink);} .node.active .st{color:var(--accent);} .node.soon .ring{border-style:dashed;} .panel-wrap{position:relative;z-index:5;max-width:880px;margin:38px auto 70px;padding:0 24px;} .panel{position:relative;border-radius:24px;padding:clamp(26px,4vw,40px);background:var(--glass-strong); border:1px solid rgba(255,255,255,.7);backdrop-filter:blur(26px) saturate(150%);box-shadow:var(--shadow);overflow:hidden;} .pf{animation:fade .45s ease both;} @keyframes fade{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}} .p-head{display:flex;align-items:center;gap:16px;margin-bottom:8px;flex-wrap:wrap;} .p-ico{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px; background:linear-gradient(135deg,rgba(106,92,255,.14),rgba(79,140,255,.12));border:1px solid rgba(255,255,255,.6);} .p-title{font-size:clamp(22px,3vw,28px);font-weight:800;} .badge{font-size:12px;padding:4px 11px;border-radius:999px;font-weight:600;} .badge.live{background:rgba(34,201,138,.14);color:#13a06a;} .badge.soon{background:rgba(120,130,170,.14);color:#7a8298;} .p-desc{color:var(--sub);font-size:15.5px;line-height:1.75;margin:14px 0 22px;max-width:640px;} .chips{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:26px;} .chip{font-size:13px;padding:8px 14px;border-radius:12px;background:var(--glass);border:1px solid var(--line); color:var(--ink);display:flex;align-items:center;gap:7px;} .chip b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800;} .cta{display:inline-flex;align-items:center;gap:9px;padding:14px 26px;border-radius:14px;font-size:16px;font-weight:600; color:#fff;text-decoration:none;background:var(--grad);box-shadow:0 12px 30px rgba(91,108,255,.4);transition:.2s;border:none;cursor:pointer;} .cta:hover{transform:translateY(-2px);box-shadow:0 16px 38px rgba(91,108,255,.5);} .cta .arr{transition:.2s;} .cta:hover .arr{transform:translateX(4px);} .soon-cta{display:inline-flex;align-items:center;gap:9px;padding:14px 26px;border-radius:14px;font-size:16px;font-weight:600; color:var(--sub);background:var(--glass);border:1px dashed #b9c0d8;cursor:default;} .notify{margin-left:12px;font-size:13px;color:var(--accent);cursor:pointer;border:none;background:none;font-weight:600;} footer{position:relative;z-index:5;text-align:center;color:#9aa1b5;font-size:12.5px;padding:10px 20px 36px;} @media(max-width:560px){.node .lbl{font-size:13px;}}</style></head><body> <div class="bg"></div> <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div> <nav class="nav"> <div class="brand"><span class="dot">句</span> 句子互动 <small>JUZI · AI Agent</small></div> <div><button class="pill">了解我们</button> <button class="pill primary">预约演示</button></div> </nav> <header class="hero"> <div class="eyebrow"><span class="live"></span> 行业 AI Agent 信息收集 · 一页填完，剩下交给 AI</div> <h1>写两句 · 传文件 · 可选 SOP<br><span class="g">3 步喂出一个懂你的 AI</span></h1> <p class="sub">不用填表、不用分类、不用学怎么用。你交原料，AI 自己读懂、组织——把行业知识变成你的 Agent。</p> </header> <div class="steps"> <div class="step"><div class="n">1</div><div class="st">写一段说明</div><div class="sd">像介绍一样写你的品牌、产品、客群，想到啥写啥</div></div> <div class="step"><div class="n">2</div><div class="st">传一些文件</div><div class="sd">手册、FAQ、政策、聊天记录…… 一股脑丢进来</div></div> <div class="step"><div class="n">3</div><div class="st">写下规矩（可选）</div><div class="sd">有话术红线 / SOP 就写，没有就跳过</div></div> </div> <div class="axis-wrap"><div class="axis" id="axis"></div></div> <div class="panel-wrap"><div class="panel"><div id="panel"></div></div></div> <footer>© 句子互动 Juzi · 行业 AI Agent 信息收集 · 交料即用，更多行业陆续上线</footer><script>const INDUSTRIES = [ { key:"consumer", label:"消费品", icon:"🛍️", status:"live", title:"消费品客服 / 导购 AI", badge:"已上线", desc:"为你的品牌训练一个更懂它的客服 / 导购 AI。你只需写一段说明、把现成的产品手册 / FAQ / 政策 / 聊天记录传进来、（可选）写下话术规矩——AI 自动读懂并组织，不需要你填任何表格。", chips:[["3","块内容填完"],["一页","无跳转·无进度条"],["上传","即用·免分类"],["AI","自动理解组织"]], href:"index2.html?industry=电商", cta:"进入信息收集" }, { key:"ip", label:"个人IP", icon:"🎙️", status:"live", title:"个人 IP · 知识付费 AI", badge:"已上线", desc:"以「人设」为核心，把你的人设介绍、内容 / 课程资料、私域话术一并交进来，AI 学着像你本人一样经营私域、先给价值再谈转化。同样是一页填完、交料即用。", chips:[["3","块内容填完"],["人设","为核心资产"],["上传","课程·话术·内容"],["AI","自动理解组织"]], href:"index2.html?industry=教育", cta:"进入信息收集" }, { key:"food", label:"餐饮", icon:"🍜", status:"live", title:"餐饮 AI 信息收集", badge:"已上线", desc:"门店、菜品、套餐、点单外卖、会员营销、投诉售后…… 面向餐饮连锁的交料即用模版。", chips:[["门店","多门店/多品牌"],["菜品","SKU 与套餐"],["上传","即用·免分类"],["AI","自动理解组织"]], href:"index2.html?industry=餐饮", cta:"进入信息收集" }, { key:"cross-border", label:"跨境", icon:"🌏", status:"live", title:"跨境业务 AI 信息收集", badge:"已上线", desc:"跨境电商、海外仓、多语言客服、平台规则…… 把你的产品Listing、FAQ、物流政策交进来，AI 帮你搞定多语言客服。", chips:[["多语言","中英文客服"],["平台","Amazon/Shopify/TikTok"],["上传","即用·免分类"],["AI","自动理解组织"]], href:"index2.html?industry=跨境", cta:"进入信息收集" }, { key:"gov", label:"政务", icon:"🏛️", status:"live", title:"政务 AI 信息收集", badge:"已上线", desc:"办事指南、政策文件、常见咨询…… 面向政务服务的交料即用模版，让群众咨询更高效。", chips:[["办事","流程指南"],["政策","文件公告"],["上传","即用·免分类"],["AI","自动理解组织"]], href:"index2.html?industry=政务", cta:"进入信息收集" }, { key:"more", label:"更多行业", icon:"✨", status:"live", title:"更多行业", badge:"已上线", desc:"电器、金融、医疗、科技、制造…… 同一套「写说明 + 传文件 + 可选 SOP」的交料方式，可裁剪到任意行业。选择最接近的行业即可开始。", chips:[["通用","一套交料方式"],["可裁剪","按行业换文案"]], href:"index2.html", cta:"进入信息收集" },];let cur = "consumer";const axis = document.getElementById("axis");function renderAxis(){ axis.innerHTML = INDUSTRIES.map(it=>` <button class="node ${it.key===cur?'active':''} ${it.status==='soon'?'soon':''}" data-k="${it.key}"> <span class="ring"></span><span class="lbl">${it.label}</span> <span class="st">${it.status==='live'?'可进入':'敬请期待'}</span> </button>`).join(""); axis.querySelectorAll(".node").forEach(n=>n.onclick=()=>{cur=n.dataset.k;renderAxis();renderPanel();});}function renderPanel(){ const it = INDUSTRIES.find(x=>x.key===cur); const chips = (it.chips||[]).map(c=>`<span class="chip"><b>${c[0]}</b> ${c[1]}</span>`).join(""); const action = it.status==="live" ? `<a class="cta" href="${it.href}">${it.cta} <span class="arr">→</span></a>` : `<span class="soon-cta">🔒 ${it.badge}</span><button class="notify" onclick="alert('已记下你的关注，${it.label}上线会第一时间通知 ✨')">上线通知我 →</button>`; document.getElementById("panel").innerHTML = ` <div class="pf"> <div class="p-head"> <div class="p-ico">${it.icon}</div> <div class="p-title">${it.title}</div> <span class="badge ${it.status==='live'?'live':'soon'}">${it.status==='live'?'● '+it.badge:it.badge}</span> </div> <p class="p-desc">${it.desc}</p> <div class="chips">${chips}</div> ${action} </div>`;}renderAxis(); renderPanel();</script></body></html>
