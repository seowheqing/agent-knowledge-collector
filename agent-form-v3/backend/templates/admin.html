<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<title>知识库管理后台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f6fa; padding: 24px; }
.container { max-width: 1000px; margin: 0 auto; }
h1 { font-size: 24px; margin-bottom: 20px; color: #1a1a2e; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.stat-card .num { font-size: 32px; font-weight: 700; color: #667eea; }
.stat-card .label { font-size: 14px; color: #666; margin-top: 4px; }
.section { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.section h2 { font-size: 18px; margin-bottom: 16px; }
table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 14px; }
th { font-weight: 600; color: #555; background: #f8f9fb; }
.btn { padding: 6px 14px; background: #667eea; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
.btn:hover { background: #5a6fd6; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
.badge-qa { background: #e8f4e8; color: #2d7a2d; }
.badge-doc { background: #e8f0ff; color: #2d5aa0; }
.entry-item { padding: 10px; border-left: 3px solid #667eea; margin-bottom: 8px; background: #fff; border-radius: 0 6px 6px 0; }
.entry-item .et { font-size: 12px; color: #888; }
.entry-item .ec { font-size: 13px; color: #333; margin-top: 4px; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
.empty { text-align: center; color: #999; padding: 40px; }
</style>
</head>
<body>
<div class="container">
    <h1>📚 Agent 知识库管理后台</h1>
    <div class="stats" id="stats"></div>
    <div class="section">
        <h2>📋 企业提交记录</h2>
        <table>
            <thead><tr><th>企业</th><th>行业</th><th>提交次数</th><th>文件数</th><th>知识条目</th><th>最近提交</th><th>操作</th></tr></thead>
            <tbody id="subBody"></tbody>
        </table>
    </div>
    <div class="section" id="detailSection" style="display:none">
        <h2>📖 知识库内容 - <span id="detailCompany"></span></h2>
        <div id="fileList"></div>
        <div id="detailContent"></div>
    </div>
</div>
<script>
// 浏览器已通过 Basic Auth 登录，同源请求自动携带凭证
const H = {};

async function loadStats() {
    const r = await fetch('/api/stats', H);
    const d = await r.json();
    document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="num">${d.total_submissions}</div><div class="label">企业提交</div></div>
        <div class="stat-card"><div class="num">${d.total_files}</div><div class="label">文件上传</div></div>
        <div class="stat-card"><div class="num">${d.total_knowledge_entries}</div><div class="label">知识条目</div></div>
        <div class="stat-card"><div class="num">${Object.keys(d.entry_type_distribution).length}</div><div class="label">内容类型</div></div>
    `;
}

async function loadSubs() {
    const r = await fetch('/api/submissions', H);
    const d = await r.json();
    const tb = document.getElementById('subBody');
    if (!d.submissions.length) {
        tb.innerHTML = '<tr><td colspan="7" class="empty">暂无记录</td></tr>';
        return;
    }
    tb.innerHTML = d.submissions.map(s => {
        const safeCompany = s.company.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;');
        return `<tr>
            <td><b>${safeCompany}</b></td>
            <td>${s.industry}</td>
            <td>${s.submit_count}次</td>
            <td>${s.file_count}个</td>
            <td>${s.entry_count}条</td>
            <td>${s.last_submit}</td>
            <td><button class="btn" data-ids="${s.submission_ids}" data-company="${safeCompany}">查看</button></td>
        </tr>`;
    }).join('');
    // 事件委托替代 inline onclick
    tb.querySelectorAll('.btn').forEach(btn => {
        btn.addEventListener('click', () => showD(btn.dataset.ids, btn.dataset.company));
    });
}

async function showD(ids, co) {
    document.getElementById('detailSection').style.display = 'block';
    document.getElementById('detailCompany').textContent = co;
    const r = await fetch('/api/knowledge/' + ids, H);
    const d = await r.json();
    const fl = document.getElementById('fileList');
    const ct = document.getElementById('detailContent');

    if (d.files && d.files.length) {
        let h = '<h3>📂 文件清单</h3><table><thead><tr><th>分类</th><th>文件名</th><th>操作</th></tr></thead><tbody>';
        d.files.forEach(f => {
            h += `<tr><td>${f.category}</td><td>${f.original_name}</td><td><a href="/api/file/${f.id}" style="color:#667eea">下载</a></td></tr>`;
        });
        h += '</tbody></table>';
        fl.innerHTML = h;
    } else {
        fl.innerHTML = '';
    }

    if (!d.total_entries) {
        ct.innerHTML = '<div class="empty">暂无条目</div>';
        return;
    }

    let html = '';
    const labels = { qa: '问答对', document: '文档段落', table: '表格', sop: 'SOP', image: '图片' };
    for (const [t, entries] of Object.entries(d.grouped)) {
        html += `<h3 style="margin:16px 0 8px"><span class="badge badge-${t === 'qa' ? 'qa' : 'doc'}">${labels[t] || t}</span> (${entries.length}条)</h3>`;
        entries.slice(0, 20).forEach(e => {
            html += `<div class="entry-item"><div class="et">${e.title}</div><div class="ec">${(e.content || '').substring(0, 300).replace(/</g, '&lt;')}</div></div>`;
        });
    }
    ct.innerHTML = html;
    document.getElementById('detailSection').scrollIntoView({ behavior: 'smooth' });
}

loadStats();
loadSubs();
</script>
</body>
</html>
